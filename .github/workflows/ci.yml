name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs when new commits are pushed to the same ref.
# Reduces queue pressure on limited runners (5 servers, 3+ concurrent jobs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Lint & Test - run golangci-lint and unit tests via Dockerfile.test
  lint-and-test:
    name: Lint & Test
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker build --file Dockerfile.test --tag app:test-${{ github.run_id }} .

      - name: Run lint and tests
        run: docker run --rm app:test-${{ github.run_id }}

      - name: Cleanup test image
        if: always()
        run: docker rmi app:test-${{ github.run_id }} || true

  # Stage 2: Build & Push - only after lint-and-test passes
  build:
    name: Build & Push Docker Image
    runs-on: [self-hosted, linux]
    needs: lint-and-test
    # Only push on commits to main, not on pull requests
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagging Strategy:
      #   - Git SHA (immutable): main-abc1234  — for production deploy & rollback
      #   - Branch (mutable):    main          — for auto-deploy to staging
      #   - Latest (mutable):    latest        — on main branch only
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
