name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs when new commits are pushed to the same ref.
# Reduces queue pressure on limited runners (5 servers, 3+ concurrent jobs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/go-service-ci.yml
    with:
      image-name: ${{ github.repository }}
    secrets: inherit
